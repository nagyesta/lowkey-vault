name: "DependencyCheck"

on:
  push:
    branches: ["main"]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ["main"]
    paths:
      - ".release-trigger"
  workflow_dispatch:
  schedule:
    # * is a special character in YAML, so we have to quote this string
    - cron: "0 7 * * 2,4,6"

permissions: read-all

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Cache DependencyCheck data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.GRADLE_USER_HOME }}/dependency-check-data/**
          key: gradle-build-dependency-check
          restore-keys: |
            gradle-build-dependency-check
      - name: Check dependencies with Gradle (if not scheduled)
        if: ${{ github.event_name != 'schedule' }}
        run: >
          ./gradlew dependencyCheckAnalyze 
          -PnvdApiKey=${{ secrets.NVD_API_KEY }} 
          --no-parallel
      - name: Check dependencies with Gradle (if scheduled)
        if: ${{ github.event_name == 'schedule' }}
        run: >
          ./gradlew dependencyCheckAnalyze 
          -PnvdApiKey=${{ secrets.NVD_API_KEY }} 
          -PossIndexUsername=${{ secrets.OSS_INDEX_USER }} 
          -PossIndexPassword=${{ secrets.OSS_INDEX_PASSWORD }} 
          --no-parallel 

